<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGB // Central File</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121316;
    --panel:#191b1f;
    --panel-2:#1e2126;
    --border:#2b2e34;
    --text:#e7e4dc;
    --muted:#8b8d93;
    --red:#b33a3a;
    --teal:#4f8a8b;
    --gold:#c9a227;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  ::selection{background:var(--gold);color:#121316;}

  /* texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background-image:radial-gradient(rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size:3px 3px;opacity:0.5;
  }

  .app{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{
    width:230px;flex-shrink:0;background:var(--panel);
    border-right:1px solid var(--border);padding:22px 0;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .brand{padding:0 20px 18px 20px;border-bottom:1px solid var(--border);margin-bottom:8px;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red);text-transform:uppercase;}
  .brand-name{font-family:'Special Elite',cursive;font-size:20px;margin-top:4px;line-height:1.2;}
  .brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;}

  .nav{display:flex;flex-direction:column;margin-top:6px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;
    color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12.5px;
    letter-spacing:0.5px;border-left:2px solid transparent;transition:all .15s ease;
  }
  .nav-item .tab-idx{color:#565962;font-size:11px;}
  .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.02);}
  .nav-item.active{color:var(--text);border-left:2px solid var(--red);background:rgba(179,58,58,0.07);}
  .nav-item.active .tab-idx{color:var(--red);}

  .sidebar-foot{margin-top:auto;padding:16px 20px 0 20px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;color:#565962;}

  /* MAIN */
  .main{flex:1;padding:36px 44px;max-width:1180px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:16px;}
  .page-title{font-family:'Special Elite',cursive;font-size:28px;}
  .page-desc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;}
  .btn{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.5px;
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:9px 16px;cursor:pointer;border-radius:2px;transition:all .15s ease;
  }
  .btn:hover{border-color:var(--red);color:var(--red);}
  .btn.primary{background:var(--red);border-color:var(--red);color:#f5eded;}
  .btn.primary:hover{background:#9c3131;color:#fff;}
  .btn.danger{background:transparent;border-color:var(--border);color:#8b6060;font-size:10px;padding:5px 10px;}
  .btn.danger:hover{border-color:var(--red);color:var(--red);}

  /* STAT GRID */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;}
  .stat-card::before{content:"";position:absolute;top:0;left:0;width:2px;height:100%;background:var(--teal);}
  .stat-num{font-family:'Special Elite',cursive;font-size:32px;}
  .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

  .section-block{margin-bottom:36px;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:"";flex:1;height:1px;background:var(--border);}

  /* CARD (dossier feel) */
  .card{
    background:var(--panel);border:1px solid var(--border);padding:18px 20px;margin-bottom:10px;
    position:relative;
  }
  .stamp{
    position:absolute;top:14px;right:16px;font-family:'Special Elite',cursive;
    font-size:10px;letter-spacing:2px;padding:3px 8px;border:1.5px solid;
    text-transform:uppercase;transform:rotate(4deg);opacity:0.85;border-radius:2px;
  }
  .stamp.unclassified{color:var(--teal);border-color:var(--teal);}
  .stamp.confidential{color:var(--gold);border-color:var(--gold);}
  .stamp.secret{color:var(--red);border-color:var(--red);}

  .card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .card-title{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}
  .card-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:5px;}
  .card-body{font-size:13px;color:#c7c4bb;margin-top:10px;line-height:1.55;}
  .badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:2px;letter-spacing:0.5px;text-transform:uppercase;}
  .badge.active{background:rgba(79,138,139,0.15);color:var(--teal);}
  .badge.inactive{background:rgba(139,141,147,0.15);color:var(--muted);}
  .badge.probation{background:rgba(201,162,39,0.15);color:var(--gold);}
  .badge.open{background:rgba(179,58,58,0.15);color:var(--red);}
  .badge.closed{background:rgba(79,138,139,0.15);color:var(--teal);}
  .badge.planning{background:rgba(201,162,39,0.15);color:var(--gold);}
  .badge.complete{background:rgba(79,138,139,0.15);color:var(--teal);}

  .reliability{display:flex;gap:3px;margin-top:6px;}
  .rdot{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .rdot.on{background:var(--gold);}

  /* FORM PANEL */
  .form-panel{background:var(--panel-2);border:1px solid var(--border);padding:18px 20px;margin-bottom:18px;display:none;}
  .form-panel.open{display:block;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .form-grid.wide{grid-template-columns:1fr;}
  label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;}
  input,select,textarea{
    width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;border-radius:2px;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);}
  textarea{resize:vertical;min-height:70px;}
  .form-actions{display:flex;gap:8px;margin-top:4px;}

  .empty{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:12px;padding:24px;text-align:center;border:1px dashed var(--border);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:11px 10px;border-bottom:1px solid var(--border);}
  tr:hover td{background:rgba(255,255,255,0.015);}
  .alias{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;}

  .view{display:none;}
  .view.active{display:block;}

  .loading{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:12px;}

  @media (max-width:800px){
    .app{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:relative;flex-direction:row;overflow-x:auto;padding:12px;}
    .brand,.sidebar-foot{display:none;}
    .nav{flex-direction:row;}
    .stat-grid{grid-template-columns:1fr 1fr;}
    .form-grid{grid-template-columns:1fr;}
    .main{padding:20px;}
  }

  /* AUTH SCREEN */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);padding:32px 30px;position:relative;}
  .auth-card::before{content:"";position:absolute;top:0;left:0;width:2px;height:100%;background:var(--red);}
  .auth-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red);text-transform:uppercase;text-align:center;}
  .auth-title{font-family:'Special Elite',cursive;font-size:22px;text-align:center;margin-top:6px;margin-bottom:22px;}
  .auth-field{margin-bottom:14px;}
  .auth-error{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);margin-top:10px;min-height:14px;}
  .auth-toggle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:18px;cursor:pointer;text-decoration:underline;}
  .auth-toggle:hover{color:var(--teal);}
  .user-chip{padding:0 20px 14px 20px;border-bottom:1px solid var(--border);margin-bottom:6px;}
  .user-chip-name{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;}
  .user-chip-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;}
  .logout-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;margin-top:8px;text-decoration:underline;display:inline-block;}
  .logout-link:hover{color:var(--red);}
</style>
</head>
<body>

<!-- AUTH SCREEN — shown until Firebase confirms a signed-in user -->
<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div class="auth-eyebrow">Restricted Access</div>
    <div class="auth-title">Sign In Required</div>
    <div class="auth-field"><label>Email</label><input id="li_email" type="email" placeholder="you@example.com"></div>
    <div class="auth-field"><label>Password</label><input id="li_pass" type="password" placeholder="Password"></div>
    <button class="btn primary" style="width:100%;" onclick="loginUser()">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- MAIN APP — hidden until authenticated -->
<div class="app" id="app-root" style="display:none;">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-eyebrow">Restricted Access</div>
      <div class="brand-name">C.G.B. Central File</div>
      <div class="brand-sub">cgb.ddns.net</div>
    </div>
    <div class="user-chip" id="user-chip"></div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">Access logged per session. All records tagged with your rank and department.</div>
  </div>

  <div class="main">
    <div id="root" class="loading">Loading records…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// >>> REPLACE THIS with the firebaseConfig object from Firebase Console
// (Project Settings > General > Your apps > Web app) <<<
const firebaseConfig = {
  apiKey: "AIzaSyAMe1nWp8FGGz4kwPsV5lEqp7DiLnZs29s",
  authDomain: "database-30a05.firebaseapp.com",
  databaseURL: "https://database-30a05-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "database-30a05",
  storageBucket: "database-30a05.firebasestorage.app",
  messagingSenderId: "384564388786",
  appId: "1:384564388786:web:72e46c00eb318a28e27aab",
  measurementId: "G-RQ47DKKQ3S"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Rank hierarchy — adjust names as needed, "level" controls permissions.
// Directorate (level 4) and above can create accounts and assign roles.
const RANKS = [
  {name:'Recruit', level:1},
  {name:'Field Agent', level:2},
  {name:'Division Lead', level:3},
  {name:'Directorate', level:4},
  {name:'Command', level:5},
];
const DIRECTORATE_LEVEL = 4;

let currentUser = null; // { uid, name, alias, department, rank, roleLevel }

const FIREBASE_URL = firebaseConfig.databaseURL;
const DATA_PATH = `${FIREBASE_URL}/hub_data.json`;

const VIEWS = [
  {id:'overview', label:'Overview'},
  {id:'roster', label:'Roster'},
  {id:'informants', label:'Informants'},
  {id:'cases', label:'Case Files'},
  {id:'memos', label:'Memorandums'},
  {id:'ops', label:'Operations'},
  {id:'access', label:'Access Control', minLevel:DIRECTORATE_LEVEL},
];

/* ===================== AUTH ===================== */

async function loginUser(){
  const email = document.getElementById('li_email').value.trim();
  const pass = document.getElementById('li_pass').value;
  const err = document.getElementById('auth-error');
  err.textContent = '';
  try{
    await auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    err.textContent = 'Sign-in failed: ' + e.message;
  }
}

async function logoutUser(){
  await auth.signOut();
}

auth.onAuthStateChanged(async (user) => {
  if(user){
    try{
      const snap = await db.ref('users/' + user.uid).get();
      const profile = snap.val();
      if(!profile){
        document.getElementById('auth-error').textContent = 'No profile found for this account — contact a Directorate member.';
        await auth.signOut();
        return;
      }
      currentUser = { uid:user.uid, ...profile };
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-root').style.display = 'flex';
      document.getElementById('user-chip').innerHTML = `
        <div class="user-chip-name">${esc(currentUser.alias || currentUser.name)}</div>
        <div class="user-chip-meta">${esc(currentUser.rank)} · ${esc(currentUser.department)}</div>
        <span class="logout-link" onclick="logoutUser()">Sign out</span>
      `;
      loadState();
    }catch(e){
      console.error('Profile load error', e);
    }
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
  }
});

let state = {
  members: [
    {id:cid(),name:'Marcus "Fenwick" Doyle',alias:'FENWICK',rank:'Director',division:'Command',status:'active',joined:'2025-03-01'},
    {id:cid(),name:'Priya Anand',alias:'CIPHER',rank:'Division Lead',division:'Cyber',status:'active',joined:'2025-04-11'},
    {id:cid(),name:'Owen Reyes',alias:'SPARROW',rank:'Field Agent',division:'Recon',status:'probation',joined:'2025-11-02'},
  ],
  informants: [
    {id:cid(),codename:'GREYFOX',handler:'CIPHER',reliability:4,lastIntel:'2026-07-12',notes:'Embedded in rival server moderation team.'},
  ],
  cases: [
    {id:cid(),title:'Operation Loose Thread',status:'open',priority:'High',summary:'Investigating leaked staff-only Discord invite circulating on a rival Roblox group.',opened:'2026-07-01'},
  ],
  memos: [
    {id:cid(),number:'MEMO-001',title:'New Vetting Procedure for Recruits',body:'All new recruits must complete a 48hr probation review with their division lead before being granted Confidential clearance.',date:'2026-07-10',author:'FENWICK'},
  ],
  ops: [
    {id:cid(),name:'Silent Perimeter',status:'active',objective:'Monitor rival server for coordinated raid activity.',assigned:'SPARROW, CIPHER',date:'2026-07-15'},
  ],
};

let currentView = 'overview';
let openForms = {};

function cid(){return 'id_'+Math.random().toString(36).slice(2,10);}

async function loadState(){
  try{
    const res = await fetch(DATA_PATH);
    if(!res.ok){
      console.error('Load error: server responded with status', res.status, '— check your FIREBASE_URL.');
      render(); // fall back to default seed data rather than crashing
      return;
    }
    const remote = await res.json();
    // only trust the response if it actually looks like our data shape
    if(remote && Array.isArray(remote.members)){
      state = remote;
    } else {
      await saveState(); // nothing valid there yet — seed the database with defaults
    }
  }catch(e){
    console.error('Load error', e);
  }
  render();
}

async function saveState(){
  try{
    await fetch(DATA_PATH, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(state)
    });
  }catch(e){
    console.error('Save error', e);
  }
}

function renderNav(){
  const nav = document.getElementById('nav');
  const visible = VIEWS.filter(v => !v.minLevel || (currentUser && currentUser.roleLevel >= v.minLevel));
  nav.innerHTML = visible.map((v,i)=>`
    <div class="nav-item ${v.id===currentView?'active':''}" onclick="switchView('${v.id}')">
      <span class="tab-idx">0${i+1}</span> ${v.label.toUpperCase()}
    </div>`).join('');
}

function switchView(id){
  currentView = id;
  render();
}

function toggleForm(key){
  openForms[key] = !openForms[key];
  render();
}

async function addRecord(type){
  const get = (name) => document.getElementById(`f_${type}_${name}`)?.value?.trim() || '';
  let entry;
  if(type==='members'){
    if(!get('name')) return;
    entry = {id:cid(),name:get('name'),alias:get('alias'),rank:get('rank'),division:get('division'),status:get('status')||'active',joined:new Date().toISOString().slice(0,10)};
  } else if(type==='informants'){
    if(!get('codename')) return;
    entry = {id:cid(),codename:get('codename'),handler:get('handler'),reliability:parseInt(get('reliability'))||3,lastIntel:new Date().toISOString().slice(0,10),notes:get('notes')};
  } else if(type==='cases'){
    if(!get('title')) return;
    entry = {id:cid(),title:get('title'),status:get('status')||'open',priority:get('priority')||'Medium',summary:get('summary'),opened:new Date().toISOString().slice(0,10)};
  } else if(type==='memos'){
    if(!get('title')) return;
    const num = 'MEMO-' + String(state.memos.length+1).padStart(3,'0');
    entry = {id:cid(),number:num,title:get('title'),body:get('body'),date:new Date().toISOString().slice(0,10),author:get('author')||'UNSIGNED'};
  } else if(type==='ops'){
    if(!get('name')) return;
    entry = {id:cid(),name:get('name'),status:get('status')||'planning',objective:get('objective'),assigned:get('assigned'),date:new Date().toISOString().slice(0,10)};
  }
  state[type].push(entry);
  openForms[type] = false;
  await saveState();
  render();
}

async function deleteRecord(type, id){
  state[type] = state[type].filter(r=>r.id!==id);
  await saveState();
  render();
}

function stampFor(seed){
  const opts = ['unclassified','confidential','secret'];
  const idx = Math.abs(hashStr(seed)) % opts.length;
  return opts[idx];
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}

function renderOverview(){
  return `
    <div class="page-head">
      <div>
        <div class="page-title">Situation Overview</div>
        <div class="page-desc">// SUMMARY OF ACTIVE HOLDINGS — CGB CENTRAL FILE</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${state.members.length}</div><div class="stat-label">Registered Members</div></div>
      <div class="stat-card"><div class="stat-num">${state.informants.length}</div><div class="stat-label">Active Informants</div></div>
      <div class="stat-card"><div class="stat-num">${state.cases.filter(c=>c.status==='open').length}</div><div class="stat-label">Open Cases</div></div>
      <div class="stat-card"><div class="stat-num">${state.ops.filter(o=>o.status==='active').length}</div><div class="stat-label">Active Operations</div></div>
    </div>

    <div class="section-block">
      <div class="section-label">Latest Memorandum</div>
      ${state.memos.length ? renderMemoCard(state.memos[state.memos.length-1]) : '<div class="empty">No memorandums filed.</div>'}
    </div>

    <div class="section-block">
      <div class="section-label">Open Cases</div>
      ${state.cases.filter(c=>c.status==='open').slice(0,3).map(renderCaseCard).join('') || '<div class="empty">No open cases.</div>'}
    </div>
  `;
}

function renderRoster(){
  return `
    <div class="page-head">
      <div>
        <div class="page-title">Member Roster</div>
        <div class="page-desc">// ${state.members.length} ON FILE</div>
      </div>
      <button class="btn primary" onclick="toggleForm('members')">+ Add Member</button>
    </div>
    <div class="form-panel ${openForms.members?'open':''}">
      <div class="form-grid">
        <div><label>Name</label><input id="f_members_name" placeholder="Full name or handle"></div>
        <div><label>Alias / Codename</label><input id="f_members_alias" placeholder="e.g. FENWICK"></div>
        <div><label>Rank</label><input id="f_members_rank" placeholder="e.g. Field Agent"></div>
        <div><label>Division</label><input id="f_members_division" placeholder="e.g. Recon"></div>
        <div><label>Status</label>
          <select id="f_members_status">
            <option value="active">Active</option>
            <option value="probation">Probation</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn primary" onclick="addRecord('members')">Save Entry</button>
        <button class="btn" onclick="toggleForm('members')">Cancel</button>
      </div>
    </div>
    ${state.members.length ? `
    <table>
      <thead><tr><th>Name</th><th>Alias</th><th>Rank</th><th>Division</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${state.members.map(m=>`
          <tr>
            <td>${esc(m.name)}</td>
            <td class="alias">${esc(m.alias)||'—'}</td>
            <td>${esc(m.rank)||'—'}</td>

function esc(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAccessControl(){
  if(!currentUser || currentUser.roleLevel < DIRECTORATE_LEVEL){
    return '<div class="empty">Directorate clearance required to view this page.</div>';
  }
  return `
    <div class="page-head">
      <div>

        <div><label>Temporary Password</label><input id="ac_pass" type="password" placeholder="Min. 6 characters"></div>
      </div>
      <div class="form-actions">
        <button class="btn primary" onclick="createMemberAccount()">Create Account</button>
      </div>
      <div class="auth-error" id="ac-status"></div>
    </div>

async function createMemberAccount(){
  const name = document.getElementById('ac_name').value.trim();
  const alias = document.getElementById('ac_alias').value.trim();
  const department = document.getElementById('ac_department').value.trim();
  const rankName = document.getElementById('ac_rank').value;
  const email = document.getElementById('ac_email').value.trim();
  const pass = document.getElementById('ac_pass').value;
  const status = document.getElementById('ac-status');
  status.textContent = '';

  if(!name || !email || pass.length < 6){
    status.textContent = 'Fill in all fields — password must be 6+ characters.';
    return;
  }
  const rank = RANKS.find(r => r.name === rankName);

  // Create the new user on a SEPARATE Firebase app instance so it doesn't
  // sign you (the admin) out of your own session in the process.
  let secondaryApp;
  try{
    secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary-' + Date.now());
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, pass);
    await db.ref('users/' + cred.user.uid).set({
      name, alias, department, rank: rank.name, roleLevel: rank.level,
      createdBy: currentUser.uid, createdAt: Date.now()
    });
    await secondaryApp.auth().signOut();
    await secondaryApp.delete();
    status.style.color = 'var(--teal)';
    status.textContent = `Account created for ${name}. Share the email/password with them securely.`;
    ['ac_name','ac_alias','ac_department','ac_email','ac_pass'].forEach(id => document.getElementById(id).value = '');
    loadUserList();
  }catch(e){
    status.style.color = 'var(--red)';
    status.textContent = 'Failed to create account: ' + e.message;
  }
}

async function loadUserList(){
  const el = document.getElementById('ac-userlist');
  if(!el) return;
  try{
    const snap = await db.ref('users').get();
    const users = snap.val() || {};
    const rows = Object.entries(users); // [uid, profile]
    el.outerHTML = rows.length ? `
      <table id="ac-userlist">
        <thead><tr><th>Name</th><th>Alias</th><th>Department</th><th>Rank</th><th></th></tr></thead>
        <tbody>
          ${rows.map(([uid,u])=>`
            <tr>
              <td>${esc(u.name)}</td>
              <td class="alias">${esc(u.alias)||'—'}</td>
              <td>${esc(u.department)}</td>
              <td>${esc(u.rank)}</td>
              <td>${uid===currentUser.uid ? '' : `<button class="btn danger" onclick="removeMemberAccount('${uid}','${esc(u.name)}')">Remove</button>`}</td>
            </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty" id="ac-userlist">No accounts found.</div>';
  }catch(e){
    el.textContent = 'Could not load account list: ' + e.message;
  }
}

async function removeMemberAccount(uid, name){
  if(!confirm(`Remove ${name}'s access? This deletes their profile immediately — they'll be signed out and blocked from signing back in. This does NOT delete their Firebase Authentication login entry; to fully remove that too, delete them in Firebase Console → Authentication → Users.`)) return;
  try{
    await db.ref('users/' + uid).remove();
    loadUserList();
  }catch(e){
    alert('Failed to remove account: ' + e.message);
  }
}

  else if(currentView==='cases') html = renderCases();
  else if(currentView==='memos') html = renderMemos();
  else if(currentView==='ops') html = renderOps();
  else if(currentView==='access') html = renderAccessControl();
  root.className = '';
  root.innerHTML = html;
  if(currentView==='access') loadUserList();
}
